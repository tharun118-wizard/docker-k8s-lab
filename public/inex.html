<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Snake Game — Docker & K8s Lab</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="container">

    <div class="top">
      <h1>🐍 Snake Game</h1>
      <p class="subtitle">CI/CD • Docker • Jenkins • Kubernetes</p>
    </div>

    <div class="scoreboard">
      <div class="card">
        <span>Score</span>
        <h2 id="score">0</h2>
      </div>

      <div class="card">
        <span>High Score</span>
        <h2 id="highScore">0</h2>
      </div>

      <div class="card">
        <span>Status</span>
        <h2 id="status">Ready</h2>
      </div>
    </div>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div class="controls">
      <button onclick="startGame()">▶ Start</button>
      <button onclick="pauseGame()">⏸ Pause</button>
      <button onclick="restartGame()">🔄 Restart</button>
    </div>

    <p class="instruction">
      Use Arrow Keys • Avoid walls & yourself
    </p>

    <div class="footer">
      <p>Version v2 • Auto Deployed via Jenkins 🚀</p>
    </div>

  </div>

  <script src="game.js"></script>
</body>
</html>
